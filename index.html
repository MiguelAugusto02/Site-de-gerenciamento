<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siteondadesabor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Controle de Vendas - Salgados</h1>
    <div class="container">
        <div class="produtos">
            <h2>Produtos</h2>
            <div class="grid">
                <div class="produto" onclick="adicionar('Coxinha', 5)">
                    Coxinha<br>R$5,00
                </div>
                <div class="produto" onclick="adicionar('Pastel', 6)">
                    Pastel<br>R$6,00
                </div>
                <div class="produto" onclick="adicionar('Enroladinho', 4)">
                    Enroladinho<br>R$4,00
                </div>
                <div class="produto" onclick="adicionar('Kibe', 5)">
                    Kibe<br>R$5,00
                </div>
            </div>
        </div>
        <div class="historico">
            <h2>Histórico</h2>
            <ul id="lista"></ul>
            <div class="total">
                Total: R$ <span id="total">0.00</span>
            </div>

            <button onclick="limpar()">Limpar Histórico</button>
            <button onclick="exportarCSV()">Exportar para Excel</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
